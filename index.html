<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sai Krishna Ghanta — Research Portfolio</title>
    <meta name="description" content="PhD in AI at University of Georgia. Multi-robot systems, computer vision, autonomous navigation.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
    <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="src/styles.css">
</head>
<body>
    <div id="root"></div>
    <div id="err-overlay" style="display:none;position:fixed;inset:0;z-index:99999;background:#fff;color:#b00020;font:12px/1.5 ui-monospace,Menlo,monospace;padding:20px;overflow:auto;white-space:pre-wrap;border-top:4px solid #b00020;"></div>
    <script>
    (function () {
      var box = document.getElementById('err-overlay');
      function show(label, msg) {
        if (!box) return;
        box.style.display = 'block';
        box.textContent += '[' + label + '] ' + msg + '\n\n';
      }
      window.addEventListener('error', function (e) {
        var loc = e.filename ? ('\n  at ' + e.filename + ':' + e.lineno + ':' + e.colno) : '';
        show('ERROR', ((e.error && e.error.stack) || e.message || String(e.error)) + loc);
      });
      window.addEventListener('unhandledrejection', function (e) {
        var r = e.reason;
        show('PROMISE', (r && (r.stack || r.message)) || String(r));
      });
      var orig = console.error.bind(console);
      console.error = function () {
        try {
          var parts = [];
          for (var i = 0; i < arguments.length; i++) {
            var a = arguments[i];
            parts.push((a && (a.stack || a.message)) || String(a));
          }
          show('console.error', parts.join(' '));
        } catch (_) {}
        orig.apply(null, arguments);
      };
      setTimeout(function () {
        var root = document.getElementById('root');
        if (root && root.children.length === 0) {
          show('NOTE', '#root is still empty after 7s — the app never mounted. The first error above is the cause.');
        }
      }, 7000);
    })();
    </script>
    <script src="src/bundle.js"></script>
</body>
</html>
