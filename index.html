<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description" content="PhD in AI at University of Georgia. Multi-robot systems, computer vision, autonomous navigation.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="src/styles.css?v=20260617-globe-canvas-fit">
</head>
<body>
    <div id="root"></div>
    <div id="err-overlay" style="display:none;position:fixed;left:0;right:0;bottom:0;max-height:40vh;z-index:99999;background:#fff;color:#b00020;font:12px/1.5 ui-monospace,Menlo,monospace;padding:14px 18px;overflow:auto;white-space:pre-wrap;border-top:4px solid #b00020;box-shadow:0 -6px 24px rgba(0,0,0,0.12);"></div>
    <script>
    (function () {
      var box = document.getElementById('err-overlay');
      // Benign browser noise that must never surface as an "error".
      function benign(msg) {
        return /ResizeObserver loop/i.test(String(msg || ''));
      }
      function silenceIfBenign(e) {
        var msg = e && ((e.error && e.error.message) || e.message || String(e.error || ''));
        if (!benign(msg)) return;
        e.preventDefault();
        e.stopImmediatePropagation();
        return false;
      }
      function show(label, msg) {
        if (!box || benign(msg)) return;
        box.style.display = 'block';
        box.textContent += '[' + label + '] ' + msg + '\n\n';
      }
      window.addEventListener('error', silenceIfBenign, true);
      window.onerror = function (msg) {
        return benign(msg) || undefined;
      };
      window.addEventListener('error', function (e) {
        var loc = e.filename ? ('\n  at ' + e.filename + ':' + e.lineno + ':' + e.colno) : '';
        show('ERROR', ((e.error && e.error.stack) || e.message || String(e.error)) + loc);
      });
      window.addEventListener('unhandledrejection', function (e) {
        var r = e.reason;
        show('PROMISE', (r && (r.stack || r.message)) || String(r));
      });
      setTimeout(function () {
        var root = document.getElementById('root');
        if (root && root.children.length === 0) {
          show('NOTE', '#root is still empty after 7s — the app never mounted.');
        }
      }, 7000);
    })();
    </script>
    <script src="src/bundle.js?v=20260617-globe-canvas-fit"></script>
</body>
</html>
