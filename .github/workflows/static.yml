# Deploy the static 3D portfolio. index.html loads the PRE-COMPILED src/bundle.js
# (built locally via ./build.sh from src/*.jsx) plus src/styles.css and Three.js.
# This job only copies files — it does NOT build. Always run ./build.sh and commit
# the updated src/bundle.js before pushing, or the deployed site won't reflect edits.
name: Deploy static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Assemble static site
        run: |
          mkdir -p _site
          cp index.html _site/
          cp -r src _site/
          cp -r attached_assets _site/
          [ -f 404.html ] && cp 404.html _site/ || true
          [ -f .thumbnail ] && cp .thumbnail _site/ || true
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
