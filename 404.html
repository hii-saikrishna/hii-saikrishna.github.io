<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Sai Krishna Ghanta</title>
    <meta name="description" content="Page not found">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'blue-primary': '#4f75f9',
                        'blue-secondary': '#3949ab',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-white">
    <div class="min-h-screen flex items-center justify-center px-4">
        <div class="max-w-md text-center">
            <div class="mb-8">
                <h1 class="text-9xl font-bold text-blue-primary mb-4">404</h1>
                <h2 class="text-3xl font-bold text-slate-800 mb-4">Page Not Found</h2>
                <p class="text-lg text-slate-600 mb-8">
                    Sorry, the page you're looking for doesn't exist. Let me help you get back on track.
                </p>
            </div>

            <div class="space-y-4">
                <a href="/" class="block bg-blue-primary hover:bg-blue-secondary text-white px-6 py-3 rounded-md font-medium transition-colors">
                    Go to Home
                </a>
                <button onclick="window.history.back()" class="block w-full border border-gray-300 text-slate-700 hover:bg-gray-50 px-6 py-3 rounded-md font-medium transition-colors">
                    Go Back
                </button>
            </div>

            <div class="mt-12 pt-8 border-t border-gray-200">
                <p class="text-sm text-slate-500 mb-4">
                    Quick links:
                </p>
                <div class="flex justify-center gap-4 flex-wrap">
                    <a href="/" class="text-blue-primary hover:text-blue-secondary text-sm font-medium">Home</a>
                    <a href="/#research" class="text-blue-primary hover:text-blue-secondary text-sm font-medium">Research</a>
                    <a href="/#publications" class="text-blue-primary hover:text-blue-secondary text-sm font-medium">Publications</a>
                    <a href="/#about" class="text-blue-primary hover:text-blue-secondary text-sm font-medium">About</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Redirect to home after 5 seconds if accessed directly
        // This prevents users from getting stuck on 404
        setTimeout(() => {
            if (window.location.pathname === '/404.html') {
                window.location.href = '/';
            }
        }, 5000);
    </script>
</body>
</html>
